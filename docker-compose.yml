version: '3.8'

services:
  ssh-auth:
    build: .
    container_name: ssh-mutual-auth
    restart: unless-stopped
    hostname: ${SERVER_NAME:-server1}
    environment:
      SERVER_NAME: ${SERVER_NAME:-server1}
      API_SECRET: ${API_SECRET}
      PEER_API_URLS: ${PEER_API_URLS:-}
      PEER_API_SECRET: ${PEER_API_SECRET}
      PEER_SSH_HOSTS: ${PEER_SSH_HOSTS:-}
      CF_TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
      SSH_USER: ${SSH_USER:-sshuser}
      SSH_USER_SHELL: ${SSH_USER_SHELL:-/bin/bash}
      API_PORT: ${API_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
    volumes:
      - ssh-keys:/keys
      - cloudflared-cfg:/etc/cloudflared
      - ./logs:/var/log/ssh-auth
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
    networks:
      - ssh-internal
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:${API_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  ssh-internal:
    driver: bridge

volumes:
  ssh-keys:
    driver: local
  cloudflared-cfg:
    driver: local
